backend:
  name: git-gateway
  branch: main

media_folder: images
public_folder: images

collections:
  - name: "homepage"
    label: "Website Content"
    files:
      - name: "homepage"
        label: "Homepage"
        file: "content.json"
        fields:
          - { label: "Hero Headline", name: "headline", widget: "string" }
          - { label: "Hero Subtext", name: "subtext", widget: "text" }
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "Email Address", name: "email", widget: "string" }
          - { label: "WhatsApp Number", name: "whatsapp", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
